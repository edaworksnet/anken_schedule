<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="案件管理">
<title>案件スケジュール</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --c-deep: #5a8fa0;
  --c-mid: #87b7c4;
  --c-light: #aed4da;
  --c-pale: #d4e8ec;
  --c-accent: #d4838a;
  --c-bg: #f5fafb;
  --c-card: #ffffff;
  --c-text: #3a5a64;
  --c-text2: #7a9aa4;
  --c-border: #d4e8ec;
  --c-sun: #d4838a;
  --c-sat: #5a8fa0;
}
body {
  font-family: 'Noto Sans JP','Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;
  background: var(--c-bg); color: var(--c-text);
  max-width: 500px; margin: 0 auto; min-height: 100vh;
  -webkit-user-select: none; user-select: none;
}
button { font-family: inherit; cursor: pointer; -webkit-appearance: none; }
input, textarea { font-family: inherit; }

.header {
  padding: 14px 16px 4px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-title { font-size: 24px; font-weight: 800; color: var(--c-deep); }
.header-title span { font-size: 13px; font-weight: 400; color: var(--c-text2); margin-left: 6px; }
.month-total {
  font-size: 11px; color: var(--c-text2);
  background: var(--c-pale); padding: 4px 10px; border-radius: 8px;
}
.month-total b { color: var(--c-deep); font-weight: 700; }

.nav { display: flex; align-items: center; justify-content: space-between; padding: 6px 16px 8px; }
.nav-btns { display: flex; gap: 6px; }
.nav-btn {
  background: var(--c-card); border: 1px solid var(--c-border); color: var(--c-deep);
  border-radius: 8px; padding: 6px 11px; font-size: 13px; font-weight: 600;
}
.nav-btn:active { background: var(--c-pale); }
.btn-new {
  background: linear-gradient(135deg, var(--c-mid), var(--c-deep));
  border: none; color: #fff; border-radius: 8px;
  padding: 7px 14px; font-size: 12px; font-weight: 700;
}
.btn-new:active { opacity: 0.85; }

.dow-row { display: grid; grid-template-columns: repeat(7,1fr); padding: 0 6px; border-bottom: 1px solid var(--c-border); }
.dow-cell { text-align: center; font-size: 11px; font-weight: 600; padding: 6px 0; color: var(--c-text2); }
.dow-cell.sun { color: var(--c-sun); }
.dow-cell.sat { color: var(--c-sat); }

.cal-body { padding: 0 6px; overflow-y: auto; }
.week-row { border-bottom: 1px solid #edf5f7; }
.date-row { display: grid; grid-template-columns: repeat(7,1fr); }
.date-cell { text-align: center; padding: 8px 0 3px; font-size: 14px; color: var(--c-text); }
.date-cell.other { color: #c8dce0; }
.date-cell.sun { color: var(--c-sun); }
.date-cell.sat { color: var(--c-sat); }
.date-cell.other.sun, .date-cell.other.sat { opacity: 0.4; }
.today-circle {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 14px;
  background: var(--c-accent); color: #fff; font-weight: 800;
}
.bar-area { position: relative; margin: 0 1px 4px; }
.bar {
  position: absolute; height: 19px; display: flex; align-items: center;
  padding: 0 5px; overflow: hidden; cursor: pointer;
  transition: box-shadow 0.15s;
}
.bar span {
  font-size: 10px; font-weight: 600; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}
.bar.selected { box-shadow: 0 0 0 2px var(--c-deep), 0 2px 8px rgba(90,143,160,0.3); }

/* Detail panel */
.detail-panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  max-width: 500px; margin: 0 auto;
  background: var(--c-card);
  border-top: 2px solid var(--c-border);
  padding: 14px 16px 20px; max-height: 45vh; overflow-y: auto;
  box-shadow: 0 -8px 30px rgba(90,143,160,0.15);
  border-radius: 16px 16px 0 0; z-index: 50;
}
.detail-handle { width: 36px; height: 4px; background: var(--c-border); border-radius: 2px; margin: 0 auto 10px; }
.detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.detail-name { font-size: 15px; font-weight: 700; }
.detail-client { font-size: 11px; color: var(--c-text2); }
.detail-btns { display: flex; gap: 6px; }
.sm-btn {
  background: var(--c-pale); border: none; color: var(--c-deep);
  border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 600;
}
.sm-btn:active { background: var(--c-light); }
.sm-btn.del { color: var(--c-accent); background: #fce8ea; }
.sm-btn.del:active { background: #f5cdd1; }
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.chip {
  background: var(--c-bg); border: 1px solid var(--c-border);
  border-radius: 6px; padding: 3px 8px; font-size: 11px;
}
.chip .label { color: var(--c-text2); }
.chip .val { font-weight: 600; }
.status-badge {
  padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600;
}
.status-btns { display: flex; gap: 5px; margin-bottom: 10px; }
.status-btn {
  padding: 5px 10px; border-radius: 6px; font-size: 10px; font-weight: 600; cursor: pointer;
  border: 1px solid var(--c-border); background: transparent; color: var(--c-text2);
}
.status-btn.active { border-color: currentColor; }
.memo-label { font-size: 10px; color: var(--c-text2); margin-bottom: 3px; }
.memo-area {
  width: 100%; min-height: 50px; background: var(--c-bg);
  border: 1px solid var(--c-border); border-radius: 8px;
  color: var(--c-text); padding: 8px 10px; font-size: 13px;
  resize: vertical; outline: none;
}
.memo-area:focus { border-color: var(--c-mid); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(90,143,160,0.3);
  display: flex; align-items: flex-end; justify-content: center; z-index: 100;
  backdrop-filter: blur(2px);
}
.modal-content {
  background: var(--c-card); border-radius: 16px 16px 0 0;
  padding: 20px 20px 28px; width: 100%; max-width: 500px;
  max-height: 80vh; overflow-y: auto;
  border-top: 2px solid var(--c-border);
}
.modal-handle { width: 36px; height: 4px; background: var(--c-border); border-radius: 2px; margin: 0 auto 12px; }
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: var(--c-deep); }
.field { margin-bottom: 10px; flex: 1; }
.field-label { font-size: 10px; color: var(--c-text2); margin-bottom: 3px; }
.field-input {
  width: 100%; background: var(--c-bg); border: 1px solid var(--c-border);
  border-radius: 8px; color: var(--c-text); padding: 8px 10px; font-size: 13px; outline: none;
}
.field-input:focus { border-color: var(--c-mid); }
.field-row { display: flex; gap: 8px; }
.form-status-btns { display: flex; gap: 6px; margin-bottom: 10px; }
.form-status-btn {
  flex: 1; padding: 7px 0; border-radius: 8px; font-size: 11px; font-weight: 600;
  cursor: pointer; border: 2px solid var(--c-border); background: transparent; color: var(--c-text2);
}
.form-status-btn.active { border-color: currentColor; }
.btn-save {
  flex: 1; padding: 10px 0; border-radius: 10px; border: none;
  background: linear-gradient(135deg, var(--c-mid), var(--c-deep));
  color: #fff; font-size: 13px; font-weight: 700;
}
.btn-save:active { opacity: 0.85; }
.btn-cancel {
  padding: 10px 14px; border-radius: 10px; border: 1px solid var(--c-border);
  background: transparent; color: var(--c-text2); font-size: 12px;
}
.form-actions { display: flex; gap: 8px; margin-top: 14px; }

/* Confirm dialog */
.confirm-overlay {
  position: fixed; inset: 0; background: rgba(90,143,160,0.4);
  display: flex; align-items: center; justify-content: center; z-index: 200;
  backdrop-filter: blur(2px);
}
.confirm-box {
  background: var(--c-card); border-radius: 16px; padding: 24px;
  width: 85%; max-width: 320px; text-align: center;
  border: 1px solid var(--c-border);
  box-shadow: 0 20px 60px rgba(90,143,160,0.2);
}
.confirm-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.confirm-sub { font-size: 12px; color: var(--c-text2); margin-bottom: 18px; }
.confirm-btns { display: flex; gap: 10px; }
.btn-yes {
  flex: 1; padding: 10px 0; border-radius: 10px; border: none;
  background: var(--c-accent); color: #fff; font-size: 13px; font-weight: 700;
}
.btn-no {
  flex: 1; padding: 10px 0; border-radius: 10px; border: 1px solid var(--c-border);
  background: transparent; color: var(--c-text); font-size: 13px; font-weight: 600;
}

/* Menu */
.menu-btn {
  background: var(--c-pale); border: none; color: var(--c-deep);
  border-radius: 8px; width: 34px; height: 34px;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
}
.menu-btn:active { background: var(--c-light); }
.menu-overlay {
  position: fixed; inset: 0; background: rgba(90,143,160,0.3); z-index: 150;
  backdrop-filter: blur(2px);
}
.menu-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  max-width: 500px; margin: 0 auto;
  background: var(--c-card); border-radius: 16px 16px 0 0;
  padding: 16px 20px 28px; z-index: 151;
  border-top: 2px solid var(--c-border);
  box-shadow: 0 -8px 30px rgba(90,143,160,0.15);
}
.menu-handle { width: 36px; height: 4px; background: var(--c-border); border-radius: 2px; margin: 0 auto 14px; }
.menu-title { font-size: 14px; font-weight: 700; color: var(--c-deep); margin-bottom: 12px; }
.menu-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border-radius: 10px;
  background: var(--c-bg); border: 1px solid var(--c-border);
  margin-bottom: 8px; font-size: 13px; font-weight: 600;
  color: var(--c-text); cursor: pointer; width: 100%;
  text-align: left;
}
.menu-item:active { background: var(--c-pale); }
.menu-item .icon { font-size: 18px; width: 24px; text-align: center; }
.menu-item .desc { font-size: 10px; font-weight: 400; color: var(--c-text2); margin-top: 1px; }
.menu-cancel {
  width: 100%; padding: 12px 0; border-radius: 10px;
  border: 1px solid var(--c-border); background: var(--c-card);
  color: var(--c-text2); font-size: 13px; font-weight: 600;
  margin-top: 4px;
}
input[type="file"].hidden-input { display: none; }

/* Category tabs */
.cat-tabs {
  display: flex; gap: 0; padding: 0 16px 8px;
}
.cat-tab {
  flex: 1; padding: 7px 0; font-size: 12px; font-weight: 700;
  border: 1.5px solid var(--c-border); background: transparent;
  color: var(--c-text2); cursor: pointer; transition: all 0.15s;
}
.cat-tab:first-child { border-radius: 8px 0 0 8px; }
.cat-tab:last-child  { border-radius: 0 8px 8px 0; }
.cat-tab:not(:first-child) { border-left: none; }
.cat-tab.active-all    { background: var(--c-deep);  border-color: var(--c-deep);  color: #fff; }
.cat-tab.active-design { background: #8a67a5; border-color: #8a67a5; color: #fff; }
.cat-tab.active-farm   { background: #78b795; border-color: #78b795; color: #fff; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const STATUS = {
  waiting: { label:"着手前", color:"#7a9aa4", bg:"#e8f2f4" },
  active:  { label:"進行中", color:"#5a8fa0", bg:"#d4e8ec" },
  done:    { label:"完了",   color:"#6ab08a", bg:"#e0f2e8" },
};
const CATEGORY = {
  design:    { label:"デザイン", icon:"🎨" },
  farm:      { label:"農業",     icon:"🌾" },
};
// 6色マトリクス: [カテゴリ][ステータス]
const BAR_COLOR_MAP = {
  design: {
    waiting: { main:"#8a67a5", sub:"#6f4f8a" },  // デザイン着手前
    active:  { main:"#347fb7", sub:"#1a659d" },  // デザイン進行中
    done:    { main:"#b8c4c8", sub:"#9eb0b5" },  // デザイン完了（共通グレー）
  },
  farm: {
    waiting: { main:"#cb8f6e", sub:"#b37455" },  // 農業着手前
    active:  { main:"#79ac69", sub:"#5e9250" },  // 農業進行中
    done:    { main:"#b8c4c8", sub:"#9eb0b5" },  // 農業完了（共通グレー）
  },
};
const DOW = ["日","月","火","水","木","金","土"];
const LS_KEY = "gantt_projects_v1";

function toDS(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fromDS(s){ const p=s.split("-").map(Number); return new Date(p[0],p[1]-1,p[2]); }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }

function loadProjects(){
  try{ const d=JSON.parse(localStorage.getItem(LS_KEY)); if(Array.isArray(d)&&d.length) return d; } catch(e){}
  return [
    {id:"1",name:"ロゴデザイン",client:"山田商店",start:"2026-04-05",end:"2026-04-18",amount:30000,status:"active",category:"design",notes:""},
    {id:"2",name:"チラシ制作",client:"カフェひだまり",start:"2026-04-10",end:"2026-04-20",amount:20000,status:"waiting",category:"design",notes:""},
    {id:"3",name:"名刺デザイン",client:"佐藤工務店",start:"2026-04-01",end:"2026-04-08",amount:10000,status:"done",category:"design",notes:"納品済み"},
  ];
}
function saveProjects(p){ localStorage.setItem(LS_KEY,JSON.stringify(p)); }

let state = {
  year: new Date().getFullYear(),
  month: new Date().getMonth(),
  projects: loadProjects(),
  selectedId: null,
  showForm: false,
  editing: null,
  confirmDeleteId: null,
  showMenu: false,
  categoryFilter: "all",
};

function getWeeks(y,m){
  const first=new Date(y,m,1), last=new Date(y,m+1,0);
  const weeks=[]; let cur=new Date(y,m,1-first.getDay());
  while(true){
    const w=[];
    for(let i=0;i<7;i++){ w.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
    weeks.push(w);
    if(cur.getMonth()!==m&&cur.getDay()===0) break;
  }
  return weeks;
}

function getBars(week, projects){
  const ws=new Date(week[0]); ws.setHours(0,0,0,0);
  const we=new Date(week[6]); we.setHours(0,0,0,0);
  const bars=[];
  projects.forEach((p,pi)=>{
    const ps=fromDS(p.start); ps.setHours(0,0,0,0);
    const pe=fromDS(p.end); pe.setHours(0,0,0,0);
    if(ps>we||pe<ws) return;
    const cs=ps<ws?ws:ps, ce=pe>we?we:pe;
    const sc=cs.getDay(), ec=ce.getDay(), span=ec-sc+1;
    bars.push({p,pi,sc,span,isS:ps>=ws&&ps<=we,isE:pe>=ws&&pe<=we});
  });
  bars.sort((a,b)=>a.sc-b.sc||b.span-a.span);
  const rows=[];
  bars.forEach(b=>{
    let r=0;
    while(true){
      if(!rows[r]) rows[r]=[];
      if(!rows[r].some(x=>!(b.sc>=x.sc+x.span||b.sc+b.span<=x.sc))){ rows[r].push(b); b.row=r; break; }
      r++;
    }
  });
  return {bars, rc:rows.length};
}

function render(){
  const {year,month,projects,selectedId,showForm,editing,confirmDeleteId,categoryFilter}=state;
  const today=new Date();
  const weeks=getWeeks(year,month);
  // カテゴリフィルター適用
  const filteredProjects = categoryFilter==="all" ? projects : projects.filter(p=>(p.category||"design")===categoryFilter);
  const sel=filteredProjects.find(p=>p.id===selectedId)||null;
  const mTotal=filteredProjects.filter(p=>{
    const ps=fromDS(p.start),pe=fromDS(p.end);
    return ps<=new Date(year,month+1,0)&&pe>=new Date(year,month,1);
  }).reduce((s,p)=>s+(p.amount||0),0);

  let h=`
  <div class="header">
    <div class="header-title">${month+1}<span style="font-size:14px;font-weight:500">月</span><span>${year}</span></div>
    <div class="month-total"><b>¥${mTotal.toLocaleString()}</b></div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
  </div>
  <div class="nav">
    <div class="nav-btns">
      <button class="nav-btn" onclick="prevM()">◀</button>
      <button class="nav-btn" style="font-size:11px;padding:5px 10px" onclick="goToday()">今日</button>
      <button class="nav-btn" onclick="nextM()">▶</button>
    </div>
    <button class="btn-new" onclick="openNew()">＋ 新規</button>
  </div>
  <div class="cat-tabs">
    <button class="cat-tab${categoryFilter==="all"?" active-all":""}" onclick="setCatFilter('all')">🗂 全体</button>
    <button class="cat-tab${categoryFilter==="design"?" active-design":""}" onclick="setCatFilter('design')">🎨 デザイン</button>
    <button class="cat-tab${categoryFilter==="farm"?" active-farm":""}" onclick="setCatFilter('farm')">🌾 農業</button>
  </div>
  <div class="dow-row">${DOW.map((d,i)=>`<div class="dow-cell${i===0?' sun':''}${i===6?' sat':''}">${d}</div>`).join("")}</div>
  <div class="cal-body" style="padding-bottom:${sel&&!showForm?'260px':'20px'}">`;

  weeks.forEach((week,wi)=>{
    const {bars,rc}=getBars(week,filteredProjects);
    h+=`<div class="week-row"><div class="date-row">`;
    week.forEach((day,di)=>{
      const inM=day.getMonth()===month;
      const isT=sameDay(day,today);
      let cls="date-cell";
      if(!inM) cls+=" other";
      if(di===0) cls+=" sun";
      if(di===6) cls+=" sat";
      const num=isT?`<span class="today-circle">${day.getDate()}</span>`:`${day.getDate()}`;
      h+=`<div class="${cls}" style="${isT?'font-weight:800':''}">${num}</div>`;
    });
    h+=`</div><div class="bar-area" style="height:${Math.max(rc*22,2)+2}px">`;
    bars.forEach(b=>{
      const left=`calc(${(b.sc/7)*100}% + 2px)`;
      const width=`calc(${(b.span/7)*100}% - 4px)`;
      const top=b.row*22;
      const cat=b.p.category||"design";
      const stKey=b.p.status||"waiting";
      const colSet=(BAR_COLOR_MAP[cat]||BAR_COLOR_MAP.design)[stKey]||(BAR_COLOR_MAP.design.waiting);
      const col=colSet.main, col2=colSet.sub;
      const rad=b.isS&&b.isE?"5px":b.isS?"5px 1px 1px 5px":b.isE?"1px 5px 5px 1px":"1px";
      const selCls=b.p.id===selectedId?"selected":"";
      h+=`<div class="bar ${selCls}" onclick="selectP('${b.p.id}')" style="left:${left};width:${width};top:${top}px;background:linear-gradient(135deg,${col},${col2});border-radius:${rad};box-shadow:0 1px 3px ${col}55"><span>${b.p.name}</span></div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;

  // Detail panel
  if(sel&&!showForm){
    const st=STATUS[sel.status]||STATUS.waiting;
    h+=`<div class="detail-panel">
      <div class="detail-handle"></div>
      <div class="detail-header">
        <div><div class="detail-name">${sel.name}</div><div class="detail-client">${sel.client||"クライアント未設定"}</div></div>
        <div class="detail-btns">
          <button class="sm-btn" onclick="openEdit('${sel.id}')">編集</button>
          <button class="sm-btn del" onclick="confirmDel('${sel.id}')">削除</button>
          <button class="sm-btn" onclick="selectP(null)">✕</button>
        </div>
      </div>
      <div class="chips">
        <span class="chip"><span class="label">期間: </span><span class="val">${sel.start} 〜 ${sel.end}</span></span>
        <span class="chip"><span class="label">金額: </span><span class="val">¥${(sel.amount||0).toLocaleString()}</span></span>
        <span class="chip"><span class="val">${(CATEGORY[sel.category||"design"]||CATEGORY.design).icon} ${(CATEGORY[sel.category||"design"]||CATEGORY.design).label}</span></span>
        <span class="status-badge" style="background:${st.bg};color:${st.color}">${st.label}</span>
      </div>
      <div class="status-btns">
        ${Object.entries(STATUS).map(([k,v])=>`<button class="status-btn${sel.status===k?' active':''}" style="${sel.status===k?'color:'+v.color+';border-color:'+v.color:''}" onclick="setStatus('${k}')">${v.label}</button>`).join("")}
      </div>
      <div class="memo-label">メモ</div>
      <textarea class="memo-area" oninput="setNotes(this.value)" placeholder="案件メモを入力...">${sel.notes||""}</textarea>
    </div>`;
  }

  // Form modal
  if(showForm&&editing){
    h+=`<div class="modal-overlay" onclick="closeForm()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-title">${editing.id?"案件を編集":"新規案件"}</div>
        <div class="field"><div class="field-label">案件名</div><input class="field-input" value="${editing.name}" oninput="editField('name',this.value)"></div>
        <div class="field"><div class="field-label">クライアント</div><input class="field-input" value="${editing.client}" oninput="editField('client',this.value)"></div>
        <div class="field-row">
          <div class="field"><div class="field-label">開始日</div><input type="date" class="field-input" value="${editing.start}" oninput="editField('start',this.value)"></div>
          <div class="field"><div class="field-label">終了日</div><input type="date" class="field-input" value="${editing.end}" oninput="editField('end',this.value)"></div>
        </div>
        <div class="field"><div class="field-label">金額 (¥)</div><input type="number" class="field-input" value="${editing.amount}" oninput="editField('amount',Number(this.value))"></div>
        <div class="field-label" style="margin-bottom:4px">カテゴリ</div>
        <div class="form-status-btns" style="margin-bottom:10px">
          ${Object.entries(CATEGORY).map(([k,v])=>{
            const catKey=editing.category||"design";
            const isActive=catKey===k;
            const catColors={design:"#e6c84a",farm:"#4aad72"};
            const cc=catColors[k]||"#87b7c4";
            return `<button class="form-status-btn${isActive?' active':''}" style="${isActive?'color:'+cc+';border-color:'+cc:''}" onclick="editField('category','${k}');render()">${v.icon} ${v.label}</button>`;
          }).join("")}
        </div>
        <div class="field-label" style="margin-bottom:4px">ステータス</div>
        <div class="form-status-btns">
          ${Object.entries(STATUS).map(([k,v])=>`<button class="form-status-btn${editing.status===k?' active':''}" style="${editing.status===k?'color:'+v.color+';border-color:'+v.color:''}" onclick="editField('status','${k}');render()">${v.label}</button>`).join("")}
        </div>
        <div class="field"><div class="field-label">メモ</div><textarea class="field-input" style="min-height:50px;resize:vertical" oninput="editField('notes',this.value)">${editing.notes||""}</textarea></div>
        <div class="form-actions">
          <button class="btn-save" onclick="saveForm()">保存</button>
          <button class="btn-cancel" onclick="closeForm()">取消</button>
        </div>
      </div>
    </div>`;
  }

  // Confirm dialog
  if(confirmDeleteId){
    const dp=projects.find(p=>p.id===confirmDeleteId);
    h+=`<div class="confirm-overlay" onclick="cancelDel()">
      <div class="confirm-box" onclick="event.stopPropagation()">
        <div class="confirm-title">本当に削除しますか？</div>
        <div class="confirm-sub">「${dp?dp.name:""}」を削除します</div>
        <div class="confirm-btns">
          <button class="btn-yes" onclick="execDel()">はい</button>
          <button class="btn-no" onclick="cancelDel()">いいえ</button>
        </div>
      </div>
    </div>`;
  }

  // Menu sheet
  if(state.showMenu){
    h+=`<div class="menu-overlay" onclick="toggleMenu()"></div>
    <div class="menu-sheet" onclick="event.stopPropagation()">
      <div class="menu-handle"></div>
      <div class="menu-title">データ管理</div>
      <button class="menu-item" onclick="exportJSON()">
        <span class="icon">📦</span>
        <div><div>バックアップ (JSON)</div><div class="desc">全案件データをエクスポート</div></div>
      </button>
      <button class="menu-item" onclick="triggerImport()">
        <span class="icon">📥</span>
        <div><div>インポート (JSON)</div><div class="desc">バックアップファイルから復元</div></div>
      </button>
      <button class="menu-item" onclick="exportCSV()">
        <span class="icon">📊</span>
        <div><div>CSV出力</div><div class="desc">Excelで開ける形式で書き出し</div></div>
      </button>
      <button class="menu-cancel" onclick="toggleMenu()">閉じる</button>
    </div>`;
  }

  h+=`<input type="file" accept=".json" class="hidden-input" id="importInput" onchange="handleImport(event)">`;

  document.getElementById("app").innerHTML=h;
}

function prevM(){ if(state.month===0){state.year--;state.month=11;}else state.month--; render(); }
function nextM(){ if(state.month===11){state.year++;state.month=0;}else state.month++; render(); }
function goToday(){ const t=new Date(); state.year=t.getFullYear(); state.month=t.getMonth(); render(); }
function setCatFilter(f){ state.categoryFilter=f; state.selectedId=null; render(); }

function selectP(id){ state.selectedId=state.selectedId===id?null:id; render(); }
function setStatus(s){ const p=state.projects.find(x=>x.id===state.selectedId); if(p){p.status=s; saveProjects(state.projects); render();} }
function setNotes(v){ const p=state.projects.find(x=>x.id===state.selectedId); if(p){p.notes=v; saveProjects(state.projects);} }

function openNew(){
  const t=new Date(); const s=new Date(state.year,state.month,Math.min(t.getDate(),28));
  const e=new Date(s); e.setDate(e.getDate()+7);
  state.editing={id:"",name:"",client:"",start:toDS(s),end:toDS(e),amount:0,status:"waiting",category:"design",notes:""};
  state.showForm=true; render();
}
function openEdit(id){ const p=state.projects.find(x=>x.id===id); if(p){state.editing={...p}; state.showForm=true; render();} }
function editField(f,v){ if(state.editing) state.editing[f]=v; }
function closeForm(){ state.showForm=false; state.editing=null; render(); }
function saveForm(){
  if(!state.editing||!state.editing.name) return;
  if(state.editing.id){
    state.projects=state.projects.map(p=>p.id===state.editing.id?{...state.editing}:p);
  } else {
    state.projects.push({...state.editing, id:Date.now().toString()});
  }
  saveProjects(state.projects);
  state.showForm=false; state.editing=null; render();
}

function confirmDel(id){ state.confirmDeleteId=id; render(); }
function cancelDel(){ state.confirmDeleteId=null; render(); }
function execDel(){
  state.projects=state.projects.filter(p=>p.id!==state.confirmDeleteId);
  if(state.selectedId===state.confirmDeleteId) state.selectedId=null;
  saveProjects(state.projects);
  state.confirmDeleteId=null; state.showForm=false; state.editing=null; render();
}

function toggleMenu(){ state.showMenu=!state.showMenu; render(); }

function downloadFile(filename, content, type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=filename; document.body.appendChild(a);
  a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function exportJSON(){
  const data=JSON.stringify(state.projects, null, 2);
  const date=toDS(new Date());
  downloadFile(`anken_backup_${date}.json`, data, "application/json");
  state.showMenu=false; render();
}

function triggerImport(){
  state.showMenu=false; render();
  setTimeout(()=>{ document.getElementById("importInput").click(); },100);
}

function handleImport(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!Array.isArray(data)){ alert("無効なファイル形式です"); return; }
      const valid=data.every(p=>p.name&&p.start&&p.end);
      if(!valid){ alert("データ形式が正しくありません"); return; }
      if(!confirm(`${data.length}件の案件をインポートします。\n現在のデータは上書きされます。\nよろしいですか？`)) return;
      state.projects=data;
      saveProjects(state.projects);
      state.selectedId=null;
      render();
      alert("インポートが完了しました");
    }catch(err){
      alert("ファイルの読み込みに失敗しました");
    }
  };
  reader.readAsText(file);
  e.target.value="";
}

function exportCSV(){
  const header=["案件名","クライアント","カテゴリ","開始日","終了日","金額","ステータス","メモ"];
  const statusLabel={waiting:"着手前",active:"進行中",done:"完了"};
  const catLabel={design:"デザイン",farm:"農業"};
  const rows=state.projects.map(p=>[
    csvEscape(p.name),
    csvEscape(p.client||""),
    catLabel[p.category||"design"]||p.category||"デザイン",
    p.start,
    p.end,
    p.amount||0,
    statusLabel[p.status]||p.status,
    csvEscape(p.notes||""),
  ].join(","));
  const bom="\uFEFF";
  const csv=bom+header.join(",")+"\n"+rows.join("\n");
  const date=toDS(new Date());
  downloadFile(`anken_${date}.csv`, csv, "text/csv;charset=utf-8");
  state.showMenu=false; render();
}

function csvEscape(s){
  if(s.includes(",")||s.includes('"')||s.includes("\n")){
    return '"'+s.replace(/"/g,'""')+'"';
  }
  return s;
}

render();
</script>
</body>
</html>
